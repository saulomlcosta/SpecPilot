name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      Ai__Provider: Fake
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restaurar dependencias do backend
        run: dotnet restore src/backend/SpecPilot.sln

      - name: Compilar backend
        run: dotnet build src/backend/SpecPilot.sln --no-restore --configuration Release

      - name: Executar testes do backend
        run: dotnet test src/backend/SpecPilot.sln --no-build --configuration Release

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/specpilot-web
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/specpilot-web/package-lock.json

      - name: Instalar dependencias do frontend
        run: npm ci

      - name: Compilar frontend
        run: npm run build

      - name: Executar testes do frontend
        run: npm test
