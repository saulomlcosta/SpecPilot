name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      Ai__Provider: Fake
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restaurar dependencias do backend
        run: dotnet restore src/backend/SpecPilot.sln

      - name: Compilar backend
        run: dotnet build src/backend/SpecPilot.sln --no-restore --configuration Release

      - name: Executar testes do backend
        run: dotnet test src/backend/SpecPilot.sln --no-build --configuration Release

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/specpilot-web
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/specpilot-web/package-lock.json

      - name: Diagnosticar contexto do frontend no CI
        run: |
          pwd
          ls -la
          node --version
          npm --version
          git rev-parse HEAD
          git log --oneline -5
          test -f package.json && echo "package.json encontrado"
          test -f package-lock.json && echo "package-lock.json encontrado"
          node -e "const fs=require('fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); console.log('lockfileVersion', lock.lockfileVersion); console.log('root package name', lock.packages?.['']?.name); console.log('has @emnapi/core', Boolean(lock.packages?.['node_modules/@emnapi/core'])); console.log('has @emnapi/runtime', Boolean(lock.packages?.['node_modules/@emnapi/runtime'])); console.log('has esbuild', Boolean(lock.packages?.['node_modules/esbuild'])); console.log('has vitest esbuild 0.28.0', Boolean(lock.packages?.['node_modules/vitest/node_modules/esbuild'])); console.log('root deps', lock.packages?.['']?.dependencies); console.log('root devDeps', lock.packages?.['']?.devDependencies);"

      - name: Instalar dependencias do frontend
        run: npm ci

      - name: Compilar frontend
        run: npm run build

      - name: Executar testes do frontend
        run: npm test
